<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STAR SHOOTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #0ff;
    overflow: hidden;
  }
  #ui {
    display: flex;
    justify-content: space-between;
    width: 400px;
    padding: 6px 0;
    font-size: 14px;
    letter-spacing: 2px;
  }
  canvas {
    border: 1px solid #0ff4;
    box-shadow: 0 0 30px #0ff3, inset 0 0 30px #0002;
    background: #000;
  }
  #overlay {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: #0ff;
    font-family: 'Courier New', monospace;
    pointer-events: none;
  }
  #overlay h1 {
    font-size: 36px;
    letter-spacing: 8px;
    text-shadow: 0 0 20px #0ff;
  }
  #overlay p {
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0.7;
    animation: blink 1.2s infinite;
  }
  #overlay .score-disp {
    font-size: 20px;
    letter-spacing: 4px;
    color: #ff0;
    text-shadow: 0 0 10px #ff0;
  }
  @keyframes blink { 0%,100%{opacity:.7} 50%{opacity:.2} }
</style>
</head>
<body>
<div id="ui">
  <span>SCORE: <span id="scoreDisp">0</span></span>
  <span>LEVEL: <span id="levelDisp">1</span></span>
  <span>LIFE: <span id="lifeDisp">♥♥♥</span></span>
</div>
<div style="position:relative">
  <canvas id="c" width="400" height="560"></canvas>
  <div id="overlay">
    <h1>STAR<br>SHOOTER</h1>
    <p>PRESS SPACE TO START</p>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const scoreDisp = document.getElementById('scoreDisp');
const levelDisp = document.getElementById('levelDisp');
const lifeDisp = document.getElementById('lifeDisp');

// --- State ---
let state = 'title'; // title | play | over
let score, level, lives;
let player, bullets, enemies, particles, stars;
let keys = {};
let shootCooldown = 0;
let enemyTimer = 0;
let frame = 0;

// --- Stars background ---
function initStars() {
  stars = Array.from({length: 80}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.6 + 0.2,
    bright: Math.random()
  }));
}

function initGame() {
  score = 0; level = 1; lives = 3;
  player = { x: W/2, y: H - 50, w: 28, h: 28, speed: 4 };
  bullets = []; enemies = []; particles = [];
  shootCooldown = 0; enemyTimer = 0; frame = 0;
  updateUI();
}

function updateUI() {
  scoreDisp.textContent = score;
  levelDisp.textContent = level;
  lifeDisp.textContent = '♥'.repeat(lives) + '♡'.repeat(Math.max(0, 3 - lives));
}

// --- Spawn ---
function spawnEnemy() {
  const types = ['normal','fast','big'];
  const t = Math.random() < 0.15 ? 'big' : Math.random() < 0.3 ? 'fast' : 'normal';
  const cfg = {
    normal: { w:22, h:22, speed:1.2, hp:1, color:'#f44', pts:10 },
    fast:   { w:16, h:16, speed:2.5, hp:1, color:'#f84', pts:20 },
    big:    { w:34, h:34, speed:0.7, hp:3, color:'#a4f', pts:50 },
  }[t];
  enemies.push({
    x: Math.random() * (W - cfg.w) + cfg.w/2,
    y: -cfg.h,
    ...cfg,
    type: t
  });
}

function spawnParticles(x, y, color, n=8) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: Math.random() * 0.04 + 0.03,
      r: Math.random() * 3 + 1, color
    });
  }
}

// --- Draw helpers ---
function drawPlayer(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  // Body
  ctx.fillStyle = '#0ff';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(0, -p.h/2);
  ctx.lineTo(p.w/2, p.h/2);
  ctx.lineTo(0, p.h/3);
  ctx.lineTo(-p.w/2, p.h/2);
  ctx.closePath();
  ctx.fill();
  // Engine glow
  ctx.fillStyle = `hsla(${frame*10%360},100%,70%,0.7)`;
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.ellipse(0, p.h/2 + 4, 5, 4 + Math.sin(frame*0.3)*2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.fillStyle = e.color;
  ctx.shadowColor = e.color;
  ctx.shadowBlur = 10;
  if (e.type === 'big') {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2 - Math.PI/2;
      const r = i % 2 === 0 ? e.w/2 : e.w/3.5;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r)
              : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
  } else if (e.type === 'fast') {
    ctx.beginPath();
    ctx.moveTo(0, e.h/2);
    ctx.lineTo(e.w/2, -e.h/2);
    ctx.lineTo(-e.w/2, -e.h/2);
    ctx.closePath();
  } else {
    ctx.beginPath();
    ctx.rect(-e.w/2, -e.h/2, e.w, e.h);
  }
  ctx.fill();
  // HP bar for big
  if (e.type === 'big') {
    ctx.fillStyle = '#fff4';
    ctx.fillRect(-e.w/2, -e.h/2 - 6, e.w, 3);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(-e.w/2, -e.h/2 - 6, e.w * (e.hp/3), 3);
  }
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = '#ff0';
  ctx.shadowColor = '#ff0';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.rect(b.x - 2, b.y - 8, 4, 12);
  ctx.fill();
  ctx.restore();
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.life;
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawStars() {
  for (const s of stars) {
    ctx.globalAlpha = 0.3 + s.bright * 0.7 * (0.6 + 0.4 * Math.sin(frame * 0.05 + s.x));
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- Main loop ---
function update() {
  frame++;

  // Stars scroll
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
  }

  if (state !== 'play') return;

  // Player move
  if (keys['ArrowLeft']  || keys['a']) player.x = Math.max(player.w/2, player.x - player.speed);
  if (keys['ArrowRight'] || keys['d']) player.x = Math.min(W - player.w/2, player.x + player.speed);

  // Shoot
  if (shootCooldown > 0) shootCooldown--;
  if ((keys[' '] || keys['z']) && shootCooldown === 0) {
    bullets.push({ x: player.x, y: player.y - player.h/2 });
    shootCooldown = 12;
  }

  // Bullets
  bullets = bullets.filter(b => {
    b.y -= 9;
    return b.y > -10;
  });

  // Enemy spawn
  const spawnRate = Math.max(40 - level * 4, 14);
  enemyTimer++;
  if (enemyTimer >= spawnRate) { spawnEnemy(); enemyTimer = 0; }

  // Enemies move
  const levelSpeed = 1 + (level - 1) * 0.15;
  enemies = enemies.filter(e => {
    e.y += e.speed * levelSpeed;
    return e.y < H + e.h;
  });

  // Bullet vs Enemy
  for (let i = bullets.length - 1; i >= 0; i--) {
    for (let j = enemies.length - 1; j >= 0; j--) {
      const b = bullets[i], e = enemies[j];
      if (!b || !e) continue;
      if (Math.abs(b.x - e.x) < e.w/2 + 2 && Math.abs(b.y - e.y) < e.h/2 + 4) {
        bullets.splice(i, 1);
        e.hp--;
        spawnParticles(e.x, e.y, e.color, 5);
        if (e.hp <= 0) {
          spawnParticles(e.x, e.y, e.color, 14);
          score += e.pts;
          level = Math.floor(score / 200) + 1;
          enemies.splice(j, 1);
          updateUI();
        }
        break;
      }
    }
  }

  // Enemy vs Player
  for (let j = enemies.length - 1; j >= 0; j--) {
    const e = enemies[j];
    if (Math.abs(e.x - player.x) < (e.w + player.w)/2 - 4 &&
        Math.abs(e.y - player.y) < (e.h + player.h)/2 - 4) {
      enemies.splice(j, 1);
      spawnParticles(player.x, player.y, '#0ff', 16);
      lives--;
      updateUI();
      if (lives <= 0) {
        state = 'over';
        overlay.innerHTML = `
          <h1>GAME<br>OVER</h1>
          <div class="score-disp">SCORE: ${score}</div>
          <p>PRESS SPACE TO RETRY</p>`;
        overlay.style.display = 'flex';
      }
    }
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    return p.life > 0;
  });
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawStars();

  if (state === 'play' || state === 'over') {
    drawPlayer(player);
    bullets.forEach(drawBullet);
    enemies.forEach(drawEnemy);
    particles.forEach(drawParticle);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// --- Input ---
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();

  if (e.key === ' ') {
    if (state === 'title' || state === 'over') {
      initGame();
      state = 'play';
      overlay.style.display = 'none';
    }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// --- Start ---
initStars();
overlay.style.display = 'flex';
loop();
</script>
</body>
</html>
