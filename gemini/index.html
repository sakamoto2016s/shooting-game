<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Shooting Game - Audio Integrated</title>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: sans-serif;
            user-select: none;
        }
        canvas {
            background: #000;
            border: 2px solid #fff;
            max-width: 100vw;
            max-height: 70vh;
        }
        #ui-top { text-align: center; margin-bottom: 10px; }
        #instructions { font-size: 12px; color: #aaa; margin-top: 5px; }
        .controls { display: flex; justify-content: space-between; width: 400px; margin-top: 20px; }
        .btn {
            background: #444; color: white; border: 2px solid #fff;
            padding: 15px 25px; font-size: 18px; touch-action: manipulation; cursor: pointer;
        }
        #shoot-btn { background: #822; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        #start-btn {
            padding: 20px 40px; font-size: 24px; cursor: pointer; background: #0a0; color: #fff; border: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>SHOOTING GAME</h1>
        <button id="start-btn">START GAME (Sound On)</button>
    </div>

    <div id="ui-top">
        <div id="info">Score: 0 | Level: 1</div>
        <div id="instructions">[←][→]: Move / [Space]: Shoot / Hold for Rapid Fire</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button class="btn" id="left-btn">←</button>
        <button class="btn" id="shoot-btn">FIRE</button>
        <button class="btn" id="right-btn">→</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const infoElement = document.getElementById('info');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');

    canvas.width = 400;
    canvas.height = 600;

    let score = 0;
    let level = 1;
    let gameOver = false;
    let gameStarted = false;

    // --- Audio System (Web Audio API) ---
    let audioCtx;
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playShootSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playExplosionSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function playBGM() {
        if (!audioCtx) return;
        const notes = [261.63, 293.66, 329.63, 349.23]; // C, D, E, F
        let step = 0;
        setInterval(() => {
            if (gameOver || !gameStarted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
            step++;
        }, 500);
    }

    // --- Game Logic ---
    const player = { x: 185, y: 560, w: 30, h: 30, speed: 6 };
    const bullets = [];
    const enemies = [];
    let enemyTimer = 0;
    let shotTimer = 0;
    const SHOT_DELAY = 10;
    const input = { left: false, right: false, shoot: false };

    window.addEventListener('keydown', e => {
        if(e.code === 'ArrowLeft') input.left = true;
        if(e.code === 'ArrowRight') input.right = true;
        if(e.code === 'Space') input.shoot = true;
    });
    window.addEventListener('keyup', e => {
        if(e.code === 'ArrowLeft') input.left = false;
        if(e.code === 'ArrowRight') input.right = false;
        if(e.code === 'Space') input.shoot = false;
    });

    const bindBtn = (id, prop) => {
        const el = document.getElementById(id);
        el.addEventListener('mousedown', () => input[prop] = true);
        el.addEventListener('mouseup', () => input[prop] = false);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); input[prop] = true; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); input[prop] = false; });
    };
    bindBtn('left-btn', 'left');
    bindBtn('right-btn', 'right');
    bindBtn('shoot-btn', 'shoot');

    startBtn.addEventListener('click', () => {
        initAudio();
        gameStarted = true;
        overlay.style.display = 'none';
        playBGM();
        draw();
    });

    function update() {
        if (gameOver || !gameStarted) return;

        level = Math.floor(score / 100) + 1;
        infoElement.innerText = `Score: ${score} | Level: ${level}`;

        if (input.left && player.x > 0) player.x -= player.speed;
        if (input.right && player.x < canvas.width - player.w) player.x += player.speed;

        if (input.shoot && shotTimer <= 0) {
            bullets.push({ x: player.x + player.w / 2 - 2, y: player.y, w: 4, h: 10 });
            playShootSound();
            shotTimer = SHOT_DELAY;
        }
        if (shotTimer > 0) shotTimer--;

        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].y -= 8;
            if (bullets[i].y < 0) bullets.splice(i, 1);
        }

        enemyTimer++;
        if (enemyTimer > Math.max(10, 50 - (level * 2))) {
            const size = 30;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size, w: size, h: size,
                speed: 2 + (level * 0.5) + Math.random() * 2
            });
            enemyTimer = 0;
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            e.y += e.speed;

            if (e.x < player.x + player.w && e.x + e.w > player.x &&
                e.y < player.y + player.h && e.y + e.h > player.y) {
                gameOver = true;
                playExplosionSound();
                setTimeout(() => { alert(`GAME OVER\nScore: ${score}`); location.reload(); }, 100);
            }

            for (let j = bullets.length - 1; j >= 0; j--) {
                const b = bullets[j];
                if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                    enemies.splice(i, 1);
                    bullets.splice(j, 1);
                    score += 10;
                    playExplosionSound();
                    break;
                }
            }
            if (e.y > canvas.height) enemies.splice(i, 1);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f0';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = '#ff0';
        bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
        ctx.fillStyle = '#f44';
        enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

        if (!gameOver) {
            update();
            requestAnimationFrame(draw);
        }
    }
</script>
</body>
</html>
